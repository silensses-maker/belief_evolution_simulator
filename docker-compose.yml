services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB_LEGACY: ${POSTGRES_DB_LEGACY}
      POSTGRES_USER_LEGACY: ${POSTGRES_USER_LEGACY}
      POSTGRES_PASSWORD_LEGACY: ${POSTGRES_PASSWORD_LEGACY}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST_LEGACY: ${DB_HOST_LEGACY}
      DB_PORT_LEGACY: ${DB_PORT_LEGACY}
      DB_NAME_LEGACY: ${POSTGRES_DB_LEGACY}
      DB_USER_LEGACY: ${POSTGRES_USER_LEGACY}
      DB_PASSWORD_LEGACY: ${POSTGRES_PASSWORD_LEGACY}
      SERVER_HOST: ${SERVER_HOST}
      SERVER_PORT: ${SERVER_PORT}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      BOOTSTRAP_ADMIN_EMAILS: ${BOOTSTRAP_ADMIN_EMAILS}
      APP_SKIP_DATABASE: ${APP_SKIP_DATABASE}
      APP_SERVER_MODE: ${APP_SERVER_MODE}
      APP_LOCAL_MODE: ${APP_LOCAL_MODE}
      APP_LEGACY_DB: ${APP_LEGACY_DB}
      APP_SERVER_LOGS: ${APP_SERVER_LOGS}
      APP_GENERAL_LOGS: ${APP_GENERAL_LOGS}
      APP_SIMULATION_LOGS: ${APP_SIMULATION_LOGS}
      APP_SKIP_WS: ${APP_SKIP_WS}
    volumes:
      - /home/krud3/secrets/firebase-bes-sa.json:/secrets/firebase-sa.json:ro
    ports:
      - "9000:9000"
    depends_on:
      - postgres
    networks:
      - app-network

