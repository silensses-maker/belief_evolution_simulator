# Despliegue a producción (servidor LIPN) vía Docker Hub:
#   1. Buildea las imágenes (backend + postgres) y las pushea a Docker Hub.
#   2. SOLO si el push salió bien, dispara el pipeline GitLab del LIPN
#      (proyecto 975), que hace `docker compose pull` + `up -d` en el server.
# El server NO clona este repo: solo consume las imágenes.
#
# Secrets requeridos: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (Docker Hub →
# Account Settings → Security → New Access Token, permiso Read/Write),
# GITLAB_TRIGGER_TOKEN.
name: Deploy LIPN (build, push & trigger)

on:
  push:
    branches:
      - master

env:
  BACKEND_IMAGE: silenssesmaker/bes-backend
  POSTGRES_IMAGE: silenssesmaker/bes-postgres

concurrency:
  group: lipn-deploy
  cancel-in-progress: false

jobs:
  build_push_trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # El build del backend compila con `sbt stage` dentro del Dockerfile —
      # la primera corrida tarda (descarga dependencias); las siguientes
      # reusan la cache de capas de GitHub Actions.
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push postgres
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile_db
          push: true
          tags: |
            ${{ env.POSTGRES_IMAGE }}:latest
            ${{ env.POSTGRES_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

      - name: Trigger LIPN pipeline
        uses: eic/trigger-gitlab-ci@v1
        with:
          url: https://depot.lipn.univ-paris13.fr
          token: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
          project_id: 975
