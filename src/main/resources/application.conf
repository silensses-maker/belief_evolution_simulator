app-dispatcher {
    control-mailbox {
        mailbox-type = "akka.dispatch.UnboundedControlAwareMailbox"
    }

    monitored-prio-mailbox {
      mailbox-type = "MonitoredPrioMailbox"
    }
    
    prio-mailbox {
          mailbox-type = "PrioMailbox"
    }
    
    priority-mailbox {
      mailbox-type = "DBActorMailbox"
    }

    # OJO: Main.scala crea el ActorSystem con
    # ConfigFactory.load().getConfig("app-dispatcher"), así que ESTE bloque es
    # la raíz de config del sistema — los overrides de akka.* deben vivir
    # aquí adentro (a nivel raíz del archivo serían ignorados).
    akka.http.server {
        # Sockets WS de larga vida: el default de 60s cortaba conexiones
        # ociosas (nadie manda pings). Ver plan de deploy 2.0.0.
        idle-timeout = 3600 s

        # Pings periódicos del servidor: mantienen vivo el socket ante el
        # idle-timeout propio y el proxy_read_timeout del reverse proxy.
        websocket.periodic-keep-alive-max-idle = 30 s

        # Default 20s — margen para requests pesados.
        request-timeout = 60 s

        # Default 8MB — los POST binarios de /simulations/custom con redes
        # grandes lo superaban.
        parsing.max-content-length = 64m
    }
}
